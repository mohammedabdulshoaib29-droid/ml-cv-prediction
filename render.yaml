services:
  - type: web
    name: ml-cv-prediction
    runtime: python
    runtimeVersion: 3.11.10
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PYTHONUNBUFFERED
        value: 1
