services:
  - type: web
    name: ml-cv-prediction
    runtime: python
    runtimeVersion: 3.11.10
    buildCommand: bash build.sh
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port 10000 --timeout-keep-alive 75 --timeout-graceful-shutdown 30 --workers 4 --loop uvloop --http httptools
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PYTHONUNBUFFERED
        value: 1
      - key: TF_CPP_MIN_LOG_LEVEL
        value: 2
